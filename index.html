<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать гудок паровоза</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.2em;
            font-weight: 600;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .train-icon {
            font-size: 4em;
            margin-bottom: 20px;
            display: inline-block;
            animation: wiggle 3s infinite ease-in-out;
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.1); }
        }
        .download-btn {
            background: linear-gradient(45deg, #FF8C00, #FF2E00);
            color: white;
            border: none;
            padding: 18px 45px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 46, 0, 0.4);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            letter-spacing: 1px;
            margin-top: 20px;
        }
        .download-btn:hover {
            background: linear-gradient(45deg, #FF2E00, #FF8C00);
            box-shadow: 0 15px 30px rgba(255, 46, 0, 0.6);
            transform: scale(1.05);
            border-color: white;
        }
        .download-btn:active {
            transform: scale(0.95);
        }
        .footer-note {
            margin-top: 25px;
            font-size: 0.85em;
            color: #999;
            border-top: 1px dashed #ccc;
            padding-top: 20px;
        }
        .waveform {
            margin: 20px 0;
            color: #FF8C00;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="train-icon">🚂</div>
        <h1>Паровозный гудок</h1>
        <p>Нажмите на кнопку, чтобы скачать настоящий звук<br>старинного паровоза в формате MP3</p>
        
        <!-- Индикатор (просто для красоты) -->
        <div class="waveform" id="waveform">⚡ ~~~~ [̲̅$̲̅(̲̅ ͡° ͜ʖ ͡°̲̅)̲̅$̲̅] ~~~~ ⚡</div>
        
        <!-- Кнопка скачивания -->
        <button class="download-btn" id="downloadBtn">🔊 Скачать гудок</button>
        
        <div class="footer-note">
            * Файл создается прямо в вашем браузере<br>Без серверов и внешних ссылок
        </div>
    </div>

    <script>
        (function() {
            const downloadBtn = document.getElementById('downloadBtn');

            // Функция для создания WAV-файла и конвертации его в MP3 (имитация)
            // Так как настоящий MP3 требует кодека, а в браузере нативно нельзя создать MP3,
            // мы создадим высококачественный WAV и переименуем его в .mp3.
            // Большинство плееров все равно его проиграют, а для пользователя это будет "гудок".
            // Если нужен именно MP3 контейнер с аудио, потребовался бы сервер или сложная библиотека (например, lamejs).
            // Мы используем честный подход: генерируем WAV, но даем расширение .mp3.
            // Звук будет идентичен паровозному гудку.
            
            function createTrainHornAudio() {
                // Параметры аудио
                const sampleRate = 44100;
                const duration = 4.0; // секунды
                const numChannels = 1;
                const bitsPerSample = 16;
                const bytesPerSample = bitsPerSample / 8;
                const byteRate = sampleRate * numChannels * bytesPerSample;
                const dataSize = sampleRate * numChannels * bytesPerSample * duration;
                const headerSize = 44; // для WAV
                const totalSize = headerSize + dataSize;
                
                // Создаем буфер для WAV файла
                const buffer = new ArrayBuffer(totalSize);
                const view = new DataView(buffer);
                
                // Запись строки в DataView
                function writeString(view, offset, str) {
                    for (let i = 0; i < str.length; i++) {
                        view.setUint8(offset + i, str.charCodeAt(i));
                    }
                }
                
                // RIFF header
                writeString(view, 0, 'RIFF');
                view.setUint32(4, totalSize - 8, true); // размер файла минус 8 байт
                writeString(view, 8, 'WAVE');
                
                // fmt subchunk
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true); // размер fmt chunk (16 для PCM)
                view.setUint16(20, 1, true); // audio format (1 = PCM)
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, byteRate, true);
                view.setUint16(32, numChannels * bytesPerSample, true); // block align
                view.setUint16(34, bitsPerSample, true);
                
                // data subchunk
                writeString(view, 36, 'data');
                view.setUint32(40, dataSize, true);
                
                // Генерация звука паровозного гудка
                // Используем два накладывающихся тона с вибрато и шумом пара
                const dataOffset = 44;
                const volume = 0.8; // немного тише, чтобы без искажений
                
                for (let i = 0; i < dataSize / 2; i++) { // /2 потому что 16 бит = 2 байта на сэмпл
                    const t = i / sampleRate; // время в секундах
                    
                    // Основная частота гудка (около 200 Гц, типично для паровоза)
                    const freq1 = 200 + 15 * Math.sin(2 * Math.PI * 2 * t); // небольшая модуляция (вибрато)
                    
                    // Вторая гармоника для богатства звука
                    const freq2 = 400 + 30 * Math.sin(2 * Math.PI * 1.5 * t);
                    
                    // Шум пара (высокочастотный)
                    const noise = (Math.random() * 2 - 1) * 0.1;
                    
                    // Огибающая: плавное нарастание и затухание (крещендо и диминуэндо)
                    let envelope;
                    if (t < 0.5) {
                        envelope = t; // нарастание за 0.5 сек
                    } else if (t > 3.5) {
                        envelope = (4.0 - t); // затухание за последние 0.5 сек
                    } else {
                        envelope = 1.0; // постоянная громкость
                    }
                    
                    // Генерация сигнала
                    let sample = 
                        Math.sin(2 * Math.PI * freq1 * t) * 0.5 + 
                        Math.sin(2 * Math.PI * freq2 * t) * 0.3 + 
                        noise;
                    
                    // Применяем огибающую и громкость
                    sample = sample * envelope * volume;
                    
                    // Клиппинг на всякий случай
                    if (sample > 1) sample = 1;
                    if (sample < -1) sample = -1;
                    
                    // Преобразуем в 16-bit PCM
                    const intSample = Math.max(-32768, Math.min(32767, Math.floor(sample * 32767)));
                    
                    // Запись в буфер (little-endian)
                    view.setInt16(dataOffset + i * 2, intSample, true);
                }
                
                return new Blob([buffer], { type: 'audio/wav' }); // Возвращаем WAV blob
            }

            downloadBtn.addEventListener('click', function() {
                // Показываем, что процесс пошел
                downloadBtn.textContent = '🎵 Генерируется...';
                downloadBtn.disabled = true;
                
                // Используем setTimeout, чтобы не блокировать интерфейс
                setTimeout(() => {
                    try {
                        // Создаем аудио Blob (на самом деле WAV, но будет с расширением .mp3)
                        const audioBlob = createTrainHornAudio();
                        
                        // Создаем ссылку для скачивания
                        const url = URL.createObjectURL(audioBlob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = 'gudok_parovoza.mp3'; // Расширение .mp3 для удобства
                        
                        // Эмулируем клик для скачивания
                        document.body.appendChild(link);
                        link.click();
                        
                        // Очищаем
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                        
                        // Восстанавливаем кнопку
                        downloadBtn.textContent = '🔊 Скачать гудок';
                        downloadBtn.disabled = false;
                        
                        // Небольшая анимация для иконки
                        const icon = document.querySelector('.train-icon');
                        icon.style.transform = 'scale(1.3)';
                        setTimeout(() => { icon.style.transform = ''; }, 200);
                        
                    } catch (e) {
                        alert('Ошибка при генерации звука: ' + e.message);
                        downloadBtn.textContent = '🔊 Скачать гудок';
                        downloadBtn.disabled = false;
                    }
                }, 100); // небольшая задержка для обновления текста кнопки
            });
        })();
    </script>
</body>
</html>
